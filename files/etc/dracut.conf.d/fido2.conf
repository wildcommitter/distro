# Fedora's dracut ships a fido2 module but does not include it by default —
# it must be explicitly added or LUKS FIDO2 unlock silently has no chance of
# working at boot even though `systemd-cryptenroll --fido2-device` succeeds.
# force_add (not add) so a future dependency-resolution break (see
# crypt-ssh.conf for a real example of this happening) fails the build
# loudly instead of just quietly omitting the module.
force_add_dracutmodules+=" fido2 "

# Enable dracut-crypt-ssh: dropbear sshd inside the initramfs so the LUKS
# passphrase can be typed in remotely (no console access required).
# FIDO2 cannot be used over this session — see fido2.conf for the local path.
#
# crypt-ssh depends on the generic "network" dracut module, whose own
# dependency resolution falls back to "network-legacy" if no network
# backend is already selected — and network-legacy no longer exists in
# Fedora's dracut, so that fallback hard-fails. Force network-manager (and
# its own dbus-broker dependency) in explicitly so "network" finds it
# already-included and never reaches the broken fallback. A *weak*
# add_dracutmodules here would silently drop crypt-ssh with no build
# failure if this ever breaks again — force_add makes that loud instead.
force_add_dracutmodules+=" dbus-broker network-manager crypt-ssh "

# Needed so the `unlock` helper inside the initramfs can drive cryptsetup.
install_items+=" /sbin/cryptsetup "

# Baked at image-build time from files/root/.ssh/authorized_keys.
dropbear_acl="/root/.ssh/authorized_keys"
